<ion-header class="fav-header">
  <div class="fav-topbar">
    <button class="back-btn" (click)="goBack()">
      <ion-icon name="chevron-back"></ion-icon>
    </button>
    <span class="fav-title">{{ lang.t['favTitle'] }}</span>
    <ion-icon name="heart" class="fav-title-icon"></ion-icon>
  </div>
</ion-header>

<ion-content class="fav-content">

  <!-- Empty -->
  <div class="empty-state" *ngIf="favorites.length === 0">
    <div class="empty-ball">
      <div class="eb-top"></div>
      <div class="eb-center"><div class="eb-btn"></div></div>
      <div class="eb-bottom"></div>
    </div>
    <h3 class="empty-title">{{ lang.t['favEmpty'] }}</h3>
    <p class="empty-sub">{{ lang.t['favEmptySub'] }}</p>
  </div>

  <!-- List -->
  <ion-list class="fav-list" *ngIf="favorites.length > 0">
    <ion-item-sliding *ngFor="let p of favorites">
      <ion-item class="fav-item" (click)="goToDetail(p.id)" lines="none" detail="false">
        <div class="fav-avatar" slot="start" [class]="'type-bg-' + (p.types[0] || 'normal')">
          <img [src]="p.sprite" [alt]="p.name" />
        </div>
        <ion-label>
          <h2 class="fav-name">{{ p.name | titlecase }}</h2>
          <p class="fav-id">{{ formatId(p.id) }}</p>
          <div class="fav-types">
            <span *ngFor="let t of p.types" [class]="'type-pill type-' + t">{{ typeLabel(t) }}</span>
          </div>
        </ion-label>
        <ion-icon name="chevron-forward" slot="end" class="fav-chevron"></ion-icon>
      </ion-item>

      <ion-item-options side="end">
        <ion-item-option color="danger" (click)="remove(p)">
          <ion-icon name="trash" slot="icon-only"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>

</ion-content>

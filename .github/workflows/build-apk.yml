name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:        # permite lanzarlo manualmente desde GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar @capacitor/android
        run: npm install @capacitor/android@8 --save

      - name: Build producción
        run: npx ng build --configuration production

      - name: Agregar plataforma Android
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Dar permisos a gradlew
        run: chmod +x android/gradlew

      - name: Build APK debug
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: pokedex-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
